services:
  # ─── Backend API ──────────────────────────────────
  - type: web
    name: plugin-monitor-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm ci && npm run build && npm run db:push
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Neon connection string
      - key: REDIS_URL
        sync: false  # Upstash Redis URL
      - key: JWT_SECRET
        generateValue: true
      - key: PLUGIN_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # Vercel URL
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ─── Worker ───────────────────────────────────────
  - type: worker
    name: plugin-monitor-worker
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && node dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Neon connection string
      - key: REDIS_URL
        sync: false  # Upstash Redis URL
      - key: PLUGIN_SECRET
        sync: false  # Same as API service
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
